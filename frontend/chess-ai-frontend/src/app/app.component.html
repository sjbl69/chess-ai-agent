<h1>Chess AI</h1>

<div style="display:flex; gap:40px;">

  <!-- ÉCHIQUIER -->
  <div>
    <div *ngFor="let row of board; let i = index" style="display:flex;">
      <div
        *ngFor="let cell of row; let j = index"
        (click)="selectSquare(i,j)"
        style="
          width:60px;
          height:60px;
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:20px;
          cursor:pointer;
          border:1px solid black;
          "
        [style.background]="(i+j)%2 === 0 ? '#f0d9b5' : '#b58863'"
      >
        {{ cell }}
      </div>
    </div>
  </div>

  <!-- IA -->
  <div>
    <h2>Recommandations IA</h2>

    <!--  BOUTONS CLIQUABLES -->
    <ul>
      <li *ngFor="let move of recommendations">
        <button (click)="playMove(move)" style="margin:5px; padding:6px;">
           {{ move }}
        </button>
      </li>
    </ul>

    <h3> Évaluation</h3>
    <p *ngIf="evaluation">
      Score: {{ evaluation.score }}  
      Best move: {{ evaluation.best_move }}
    </p>

    <h3> Contexte</h3>
    <p>{{ context }}</p>

    <h3> Vidéos</h3>
    <ul>
      <li *ngFor="let video of videos">
        <a [href]="video.url" target="_blank">{{ video.title }}</a>
      </li>
    </ul>

  </div>

</div>
